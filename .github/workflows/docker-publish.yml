name: Publish Docker image

# Builds the deployer image and publishes it to GitHub Container Registry (GHCR) only on version
# tags (v*) or a manual run. Merges to main do NOT auto-publish, so :latest moves only on a
# deliberate, reviewed release. Uses the repo's built-in GITHUB_TOKEN, no extra secrets needed.
# Pull it with:  docker pull ghcr.io/pmoses-s1/s1-ingest-health-deployer:latest
# Cut a release with:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # QEMU + buildx enable a multi-arch build so the image runs natively on both Intel/AMD
      # (linux/amd64) and Apple Silicon / ARM (linux/arm64), no emulation warning on M-series Macs.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            INGEST_VERSION=${{ github.ref_type == 'tag' && github.ref_name || format('0.0.0+{0}', github.sha) }}
            INGEST_BUILD_DATE=${{ github.event.repository.updated_at }}
